<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMPT Chat IA - Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root { --bg: #ffffff; --sidebar: #f9f9f9; --text: #1a1a1a; --bubble-user: #f4f4f4; --input: #fff; --accent: #10a37f; }
        .dark { --bg: #212121; --sidebar: #171717; --text: #ececec; --bubble-user: #2f2f2f; --input: #3e3f4b; --accent: #10a37f; }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; transition: 0.3s; }
        #sidebar { width: 260px; background: var(--sidebar); display: flex; flex-direction: column; padding: 10px; border-right: 1px solid #444; }
        .nav-btn { padding: 12px; border: 1px solid #4d4d4d; border-radius: 5px; cursor: pointer; text-align: center; margin-bottom: 20px; }
        #history { flex: 1; overflow-y: auto; font-size: 14px; }
        .history-item { padding: 8px; cursor: pointer; border-radius: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item:hover { background: var(--bubble-user); }

        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        #chat { flex: 1; overflow-y: auto; padding: 20px 20%; padding-bottom: 120px; }
        
        .msg { margin-bottom: 25px; line-height: 1.6; }
        .user { font-weight: bold; margin-bottom: 5px; display: flex; align-items: center; gap: 10px; }
        .ai-content { padding-left: 30px; }
        pre { background: #000; padding: 15px; border-radius: 8px; overflow-x: auto; color: #fff; }

        .input-area { position: absolute; bottom: 20px; width: 60%; left: 20%; background: var(--input); border: 1px solid #444; border-radius: 12px; padding: 10px; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        #user-input { flex: 1; background: transparent; border: none; color: inherit; outline: none; font-size: 16px; }
        .btn { cursor: pointer; background: none; border: none; font-size: 20px; color: var(--accent); }
        .gen-img { width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid var(--accent); }
    </style>
</head>
<body class="dark">

<div id="sidebar">
    <div class="nav-btn" onclick="newChat()">+ Nouveau Chat</div>
    <div id="history"></div>
    <div class="nav-btn" onclick="toggleTheme()">🌓 Mode Jour/Nuit</div>
</div>

<div id="main">
    <header>
        <div style="font-weight: bold;">AMPT Chat IA <span style="color:var(--accent)">PRO</span></div>
    </header>

    <div id="chat">
        <div class="msg">
            <div class="user">🤖 AMPT Chat IA</div>
            <div class="ai-content">Mode Développeur Activé. Je peux coder, analyser tes photos ou générer des images (tape "génère une image de...").</div>
        </div>
    </div>

    <div class="input-area">
        <label for="img-in" style="cursor:pointer">➕</label>
        <input type="file" id="img-in" hidden accept="image/*">
        <input type="text" id="user-input" placeholder="Demandez n'importe quoi...">
        <button class="btn" onclick="startVoice()">🎤</button>
        <button class="btn" onclick="send()">➤</button>
    </div>
</div>

<script>
    const API_KEY = "AIzaSyCvNZwgM7TXemFrZRZeaVHXyIUSVLPzRqU";
    let history = JSON.parse(localStorage.getItem('ampt_history')) || [];

    function toggleTheme() { document.body.classList.toggle('dark'); }

    function updateHistory(text) {
        if(!text) return;
        history.unshift(text.substring(0, 30));
        if(history.length > 10) history.pop();
        localStorage.setItem('ampt_history', JSON.stringify(history));
        renderHistory();
    }

    function renderHistory() {
        const hDiv = document.getElementById('history');
        hDiv.innerHTML = history.map(h => `<div class="history-item">💬 ${h}...</div>`).join('');
    }
    renderHistory();

    async function send() {
        const input = document.getElementById('user-input');
        const text = input.value;
        if(!text) return;

        appendMessage("Moi", text);
        input.value = "";
        updateHistory(text);

        // Détection génération image
        if(text.toLowerCase().includes("génère une image")) {
            const prompt = text.replace("génère une image de", "").trim();
            const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&nologo=true`;
            appendMessage("AMPT Chat IA", `Voici votre image pour : "${prompt}"<br><img src="${imgUrl}" class="gen-img">`);
            return;
        }

        try {
            const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({ contents: [{ parts: [{ text: text }] }] })
            });
            const data = await resp.json();
            const resText = data.candidates[0].content.parts[0].text;
            appendMessage("AMPT Chat IA", marked.parse(resText));
            hljs.highlightAll();
        } catch (e) {
            appendMessage("Erreur", "Vérifiez votre clé API dans le code.");
        }
    }

    function appendMessage(sender, content) {
        const chat = document.getElementById('chat');
        chat.innerHTML += `<div class="msg"><div class="user">${sender}</div><div class="ai-content">${content}</div></div>`;
        chat.scrollTop = chat.scrollHeight;
    }

    function startVoice() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'fr-FR';
        rec.start();
        rec.onresult = (e) => { document.getElementById('user-input').value = e.results[0][0].transcript; };
    }

    function newChat() { location.reload(); }
</script>
</body>
</html>

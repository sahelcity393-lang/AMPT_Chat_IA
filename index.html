<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMPT Chat IA</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --sidebar-bg: #f9f9f9;
            --main-bg: #ffffff;
            --logo-cyan: #00d2ff;
            --logo-blue: #3a7bd5;
            --text-color: #0d0d0d;
            --border: #e5e5e5;
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            margin: 0; display: flex; height: 100vh;
            background: var(--main-bg); color: var(--text-color);
        }

        /* Sidebar style ChatGPT */
        #sidebar {
            width: 260px; background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 15px;
        }

        .nav-item {
            padding: 12px; margin-bottom: 5px; cursor: pointer;
            border-radius: 8px; display: flex; align-items: center; gap: 12px;
            font-size: 14px; transition: 0.2s;
        }
        .nav-item:hover { background: #ececec; }
        .nav-item i { font-size: 18px; }

        /* Main Area */
        #main { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
        
        header {
            width: 100%; padding: 15px 25px; display: flex; 
            justify-content: space-between; align-items: center;
        }

        .logo-header { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; }
        .logo-header img { height: 32px; width: 32px; border-radius: 6px; }

        #chat-container {
            width: 100%; max-width: 800px; flex: 1;
            overflow-y: auto; padding: 50px 20px;
        }

        .welcome-text {
            text-align: center; margin-top: 15vh; font-size: 26px; font-weight: 600;
            background: linear-gradient(90deg, var(--logo-cyan), var(--logo-blue));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        /* Bubble Style */
        .message { margin-bottom: 30px; line-height: 1.7; font-size: 16px; }
        .user-msg { font-weight: 700; color: #000; }
        .ai-msg { color: #333; }

        /* Barre de saisie style "Capture" avec couleurs du logo */
        .input-group {
            position: absolute; bottom: 35px; width: 90%; max-width: 760px;
            background: #f4f4f4; border-radius: 30px; padding: 10px 18px;
            display: flex; align-items: center; gap: 15px;
            border: 1px solid transparent; transition: 0.3s;
        }
        .input-group:focus-within { border-color: var(--logo-cyan); background: #fff; box-shadow: 0 0 15px rgba(0, 210, 255, 0.1); }

        #user-input {
            flex: 1; border: none; background: transparent;
            font-size: 16px; outline: none; padding: 10px 0;
        }

        .icon-action {
            background: none; border: none; cursor: pointer;
            font-size: 20px; color: #676767; transition: 0.2s;
        }
        .icon-action:hover { color: var(--logo-cyan); }

        /* Bouton d'envoi rond comme sur la capture mais avec ton dégradé */
        .send-btn {
            background: linear-gradient(135deg, var(--logo-cyan), var(--logo-blue));
            color: white; border-radius: 50%; width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            border: none; cursor: pointer; font-size: 18px;
        }
        .send-btn:hover { opacity: 0.9; transform: scale(1.05); }

    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="nav-item" onclick="location.reload()"><span>➕</span> Nouveau chat</div>
        <div class="nav-item"><span>🔍</span> Recherche approfondie</div>
        <div class="nav-item"><span>🎨</span> Générateur d'images</div>
        <div class="nav-item"><span>⚙️</span> Paramètres</div>
        <div style="margin-top: auto;" class="nav-item"><span>👤</span> Abdoul Raouf</div>
    </nav>

    <main id="main">
        <header>
            <div class="logo-header">
                <img src="logo.png" alt="L"> AMPT Chat IA
            </div>
            <div style="font-size: 12px; opacity: 0.5;">Modèle : Gemini 1.5 Flash</div>
        </header>

        <div id="chat-container">
            <div id="start-screen" class="welcome-text">Toujours prêt à répondre.</div>
        </div>

        <div class="input-group">
            <label for="img-upload" class="icon-action" title="Joindre une image">📎</label>
            <input type="file" id="img-upload" hidden accept="image/*">
            
            <input type="text" id="user-input" placeholder="Demandez n'importe quoi à AMPT...">
            
            <button class="icon-action" id="voice-btn">🎤</button>
            <button class="send-btn" id="send-btn">↑</button>
        </div>
    </main>

    <script>
        // TA NOUVELLE CLÉ API GOOGLE
        const API_KEY = "AIzaSyACKD7wHn010n5IP3xHUNxCrQtEKEJSUEw";

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const startScreen = document.getElementById('start-screen');

        async function processChat() {
            const text = userInput.value.trim();
            if (!text) return;

            if (startScreen) startScreen.remove();

            // Message Utilisateur
            chatContainer.innerHTML += `<div class="message user-msg">${text}</div>`;
            userInput.value = "";

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: text }] }]
                    })
                });

                const data = await response.json();
                const aiResponse = data.candidates[0].content.parts[0].text;

                // Message IA avec rendu Markdown
                chatContainer.innerHTML += `<div class="message ai-msg">${marked.parse(aiResponse)}</div>`;
                chatContainer.scrollTop = chatContainer.scrollHeight;

            } catch (err) {
                chatContainer.innerHTML += `<div class="message" style="color:red">Désolé, une erreur est survenue. Vérifiez votre clé API.</div>`;
            }
        }

        document.getElementById('send-btn').onclick = processChat;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') processChat() };

        // Reconnaissance Vocale
        const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (Speech) {
            const rec = new Speech();
            rec.lang = 'fr-FR';
            document.getElementById('voice-btn').onclick = () => rec.start();
            rec.onresult = (e) => { userInput.value = e.results[0][0].transcript; };
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMPT Chat IA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .chat-container { height: calc(100vh - 160px); }
        .message-user { align-self: flex-end; background-color: #3b82f6; color: white; }
        .message-model { align-self: flex-start; background-color: #f3f4f6; color: #1f2937; }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <header class="bg-white shadow-sm p-4 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-blue-600">AMPT Chat IA</h1>
            <div id="user-status" class="text-sm text-gray-500">Non connecté</div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4">
        <div id="chat-window" class="chat-container overflow-y-auto flex flex-col space-y-4 p-4 border rounded-lg bg-white shadow-inner">
            <div class="message-model p-3 rounded-lg max-w-[80%]">
                Bonjour ! Je suis AMPT Chat IA. Comment puis-je vous aider aujourd'hui ?
            </div>
        </div>

        <div class="mt-4 flex gap-2">
            <input type="text" id="user-input" 
                   class="flex-1 p-3 border rounded-full focus:outline-none focus:ring-2 focus:ring-blue-400" 
                   placeholder="Écrivez votre message...">
            <button id="send-btn" class="bg-blue-600 text-white px-6 py-2 rounded-full hover:bg-blue-700 transition">
                Envoyer
            </button>
        </div>
    </main>

    <script type="module">
        // Importation simplifiée des SDK (Simulé pour le format HTML seul)
        const API_KEY = "VOTRE_CLE_API_GEMINI"; // À configurer selon .env.example

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');

        // Fonction pour ajouter un message à l'écran
        function appendMessage(role, text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `p-3 rounded-lg max-w-[80%] ${role === 'user' ? 'message-user' : 'message-model'}`;
            msgDiv.textContent = text;
            chatWindow.appendChild(msgDiv);
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        // Logique d'envoi (Version simplifiée sans Firebase pour démo HTML)
        async function handleSend() {
            const text = userInput.value.trim();
            if (!text) return;

            // 1. Afficher le message utilisateur
            appendMessage('user', text);
            userInput.value = '';

            // 2. Simulation de réponse IA (Normalement via @google/genai)
            appendMessage('model', "Analyse du message en cours... (Connectez votre clé API Gemini pour une réponse réelle).");
            
            // Note : Pour implémenter Gemini ici, vous utiliseriez :
            // const model = genAI.getGenerativeModel({ model: "gemini-pro" });
            // const result = await model.generateContent(text);
        }

        sendBtn.addEventListener('click', handleSend);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleSend();
        });
    </script>
</body>
</html>

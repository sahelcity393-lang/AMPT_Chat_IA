<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMPT Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --sidebar-bg: #f9f9f9;
            --main-bg: #ffffff;
            --text-color: #000000;
            --border-color: #e5e5e5;
            --input-border: #dee2e6;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--main-bg);
            color: var(--text-color);
        }

        /* Barre latérale - Comme sur ta capture */
        #sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 10px;
            font-size: 14px;
        }

        .side-item {
            padding: 10px;
            margin-bottom: 5px;
            cursor: pointer;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: background 0.2s;
        }

        .side-item:hover { background-color: #ececec; }

        /* Zone principale */
        #main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }

        #chat-window {
            width: 100%;
            max-width: 800px;
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Message Style */
        .msg { max-width: 100%; line-height: 1.6; font-size: 16px; }
        .user-msg { font-weight: bold; margin-bottom: 10px; }
        .ai-msg { margin-bottom: 30px; }

        /* Le centre : Toujours prêt à répondre */
        .welcome-title {
            margin-top: 15vh;
            font-size: 24px;
            font-weight: 600;
            text-align: center;
        }

        /* Barre de saisie arrondie - Exactement comme la capture */
        .input-box {
            position: absolute;
            bottom: 40px;
            width: 90%;
            max-width: 760px;
            background: #f4f4f4;
            border-radius: 26px;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #user-input {
            flex: 1;
            border: none;
            background: transparent;
            font-size: 16px;
            outline: none;
            padding: 10px 0;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #676767;
        }

        .send-btn-circle {
            background-color: #000;
            color: #fff;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            transition: opacity 0.2s;
        }

        #preview-img { max-width: 100px; border-radius: 10px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="side-item" onclick="location.reload()">➕ Nouveau chat</div>
        <div class="side-item">🔍 Rechercher des chats</div>
        <div class="side-item">🖼️ Images</div>
        <div style="margin-top: auto;" class="side-item">👤 Abdoul Raouf...</div>
    </div>

    <div id="main-container">
        <div id="chat-window">
            <div id="welcome-area" class="welcome-title">Toujours prêt à répondre.</div>
        </div>

        <div class="input-box">
            <label for="file-in" class="icon-btn" title="Ajouter">➕</label>
            <input type="file" id="file-in" hidden accept="image/*">
            
            <input type="text" id="user-input" placeholder="Poser une question">
            
            <button class="icon-btn" id="mic-btn">🎙️</button>
            <button class="icon-btn send-btn-circle" id="send-btn">↑</button>
        </div>
    </div>

    <script>
        // TA CLÉ API OPENAI
        const API_KEY = "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";

        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const welcomeArea = document.getElementById('welcome-area');

        async function talkToAI() {
            const prompt = userInput.value.trim();
            if (!prompt) return;

            if (welcomeArea) welcomeArea.remove();

            // Afficher message utilisateur
            chatWindow.innerHTML += `<div class="msg user-msg">${prompt}</div>`;
            userInput.value = "";

            try {
                const response = await fetch("https://api.openai.com/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: "gpt-4o-mini",
                        messages: [{role: "user", content: prompt}]
                    })
                });

                const data = await response.json();
                const aiText = data.choices[0].message.content;

                chatWindow.innerHTML += `<div class="msg ai-msg">${marked.parse(aiText)}</div>`;
                chatWindow.scrollTop = chatWindow.scrollHeight;

            } catch (error) {
                chatWindow.innerHTML += `<div class="msg ai-msg" style="color:red">Erreur : Vérifiez votre connexion ou la validité de la clé.</div>`;
            }
        }

        document.getElementById('send-btn').onclick = talkToAI;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') talkToAI() };

        // Micro simplifié
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'fr-FR';
        document.getElementById('mic-btn').onclick = () => recognition.start();
        recognition.onresult = (e) => { userInput.value = e.results[0][0].transcript; };
    </script>
</body>
</html>

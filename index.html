<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMPT Chat IA - Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --bg-dark: #212121;
            --sidebar-bg: #171717;
            --text-main: #ececec;
            --input-bg: #2f2f2f;
            --accent: #3d8bff;
        }
        body {
            font-family: 'Sentry', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        /* Sidebar */
        #sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            padding: 15px;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }
        .new-chat {
            border: 1px solid #4d4d4d;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: 0.2s;
        }
        .new-chat:hover { background: #2d2d2d; }

        /* Main Chat Area */
        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }
        header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
        }
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px 15% 100px 15%;
            scroll-behavior: smooth;
        }
        .message-row {
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
        }
        .user-row { align-items: flex-end; }
        .ai-row { align-items: flex-start; }
        
        .bubble {
            max-width: 85%;
            padding: 12px 18px;
            border-radius: 15px;
            font-size: 16px;
            line-height: 1.6;
        }
        .user-bubble { background: var(--input-bg); border-radius: 20px 20px 2px 20px; }
        .ai-bubble { background: transparent; }

        /* Input Zone */
        .input-container {
            position: absolute;
            bottom: 30px;
            width: 70%;
            left: 15%;
            background: var(--input-bg);
            border-radius: 15px;
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        #user-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 16px;
            max-height: 150px;
        }
        .btn-icon {
            background: none;
            border: none;
            color: #b4b4b4;
            cursor: pointer;
            font-size: 20px;
            transition: 0.2s;
        }
        .btn-icon:hover { color: white; }
        #send-btn { color: var(--accent); }

        .img-preview { width: 100px; border-radius: 5px; margin-top: 10px; border: 2px solid var(--accent); }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="new-chat" onclick="location.reload()">
            <span>+</span> Nouveau Chat
        </div>
        <div style="margin-top: 20px; color: #888; font-size: 12px;">HISTORIQUE (Bientôt)</div>
    </nav>

    <main id="main-content">
        <header>
            <span style="cursor:pointer" onclick="toggleSidebar()">☰</span>
            <span>AMPT Chat IA</span>
            <span style="font-size: 12px; opacity: 0.5;">v2.0 Pro</span>
        </header>

        <div id="chat-window">
            <div class="message-row ai-row">
                <div class="bubble ai-bubble">Bonjour ! Je suis <b>AMPT Chat IA</b>. Comment puis-je vous aider aujourd'hui ?</div>
            </div>
        </div>

        <div class="input-container">
            <label for="file-up" class="btn-icon">+</label>
            <input type="file" id="file-up" hidden accept="image/*">
            
            <input type="text" id="user-input" placeholder="Message AMPT Chat IA...">
            
            <button class="btn-icon" id="voice-btn" title="Micro">🎤</button>
            <button class="btn-icon" id="send-btn">➤</button>
        </div>
        <div id="preview-area" style="position: absolute; bottom: 90px; left: 16%;"></div>
    </main>

    <script>
        const API_KEY = "TA_CLE_API_ICI"; // <--- AIzaSyCvNZwgM7TXemFrZRZeaVHXyIUSVLPzRqU
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const fileInput = document.getElementById('file-up');
        const previewArea = document.getElementById('preview-area');
        let currentImgBase64 = null;

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.style.display = sb.style.display === 'none' ? 'flex' : 'none';
        }

        // Gestion Image
        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = () => {
                currentImgBase64 = reader.result.split(',')[1];
                previewArea.innerHTML = `<img src="${reader.result}" class="img-preview">`;
            };
            reader.readAsDataURL(file);
        };

        // Voix
        const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        recognition.lang = 'fr-FR';
        document.getElementById('voice-btn').onclick = () => {
            recognition.start();
            userInput.placeholder = "J'écoute...";
        };
        recognition.onresult = (e) => {
            userInput.value = e.results[0][0].transcript;
            userInput.placeholder = "Message AMPT Chat IA...";
        };

        async function askIA() {
            const prompt = userInput.value;
            if (!prompt && !currentImgBase64) return;

            // Affichage User
            const uRow = `<div class="message-row user-row"><div class="bubble user-bubble">${prompt}</div></div>`;
            chatWindow.innerHTML += uRow;
            userInput.value = "";
            previewArea.innerHTML = "";

            try {
                let bodyData = { contents: [{ parts: [{ text: prompt }] }] };
                if (currentImgBase64) {
                    bodyData.contents[0].parts.push({ inline_data: { mime_type: "image/jpeg", data: currentImgBase64 } });
                }

                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(bodyData)
                });

                const data = await resp.json();
                const aiResp = data.candidates[0].content.parts[0].text;
                
                chatWindow.innerHTML += `<div class="message-row ai-row"><div class="bubble ai-bubble">${marked.parse(aiResp)}</div></div>`;
                chatWindow.scrollTop = chatWindow.scrollHeight;
            } catch (e) {
                console.error(e);
            }
            currentImgBase64 = null;
        }

        document.getElementById('send-btn').onclick = askIA;
        userInput.onkeypress = (e) => { if(e.key === 'Enter') askIA() };
    </script>
</body>
</html>

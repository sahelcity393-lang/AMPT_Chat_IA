<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMPT Chat IA - Ultra</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        :root {
            --bg: #0b0b0f;
            --sidebar: #13131a;
            --text: #ffffff;
            --accent: #00d2ff;
            --accent-glow: rgba(0, 210, 255, 0.3);
            --bubble-user: #1c1c24;
            --input-bg: #1c1c24;
        }
        
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR FUTURISTE */
        #sidebar { 
            width: 280px; background: var(--sidebar); display: flex; flex-direction: column; 
            padding: 20px; border-right: 1px solid #2d2d3d; transition: 0.3s;
        }
        .nav-btn { 
            padding: 12px; border: 1px solid var(--accent); border-radius: 12px; 
            cursor: pointer; text-align: center; margin-bottom: 20px; font-weight: bold;
            color: var(--accent); transition: 0.3s; box-shadow: 0 0 10px var(--accent-glow);
        }
        .nav-btn:hover { background: var(--accent); color: white; box-shadow: 0 0 20px var(--accent); }
        #history { flex: 1; overflow-y: auto; font-size: 14px; color: #aaa; }
        .history-item { padding: 10px; cursor: pointer; border-bottom: 1px solid #2d2d3d; }
        .history-item:hover { color: var(--accent); }

        /* ZONE PRINCIPALE */
        #main { flex: 1; display: flex; flex-direction: column; position: relative; }
        header { 
            padding: 15px 30px; display: flex; justify-content: space-between; 
            align-items: center; background: rgba(11, 11, 15, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid #2d2d3d;
        }
        .logo-area { display: flex; align-items: center; gap: 12px; }
        .logo-img { height: 45px; width: 45px; border-radius: 10px; object-fit: cover; box-shadow: 0 0 15px var(--accent-glow); }

        #chat { flex: 1; overflow-y: auto; padding: 40px 15%; scroll-behavior: smooth; }
        
        .msg { margin-bottom: 30px; animation: fadeIn 0.4s ease; }
        .user-tag { font-weight: bold; color: var(--accent); margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .ai-content { line-height: 1.7; font-size: 16px; color: #e0e0e0; }
        
        /* CODE BLOCK DESIGN */
        pre { background: #000; padding: 18px; border-radius: 12px; border: 1px solid #333; overflow-x: auto; }

        /* INPUT AREA */
        .input-wrapper {
            position: absolute; bottom: 30px; width: 70%; left: 15%; 
            background: var(--input-bg); border: 1px solid #3d3d4d; 
            border-radius: 20px; padding: 12px 20px; display: flex; 
            align-items: center; gap: 15px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        #user-input { 
            flex: 1; background: transparent; border: none; color: white; 
            outline: none; font-size: 16px; 
        }
        .action-btn { background: none; border: none; color: #888; cursor: pointer; font-size: 22px; transition: 0.2s; }
        .action-btn:hover { color: var(--accent); transform: scale(1.1); }
        #send-btn { color: var(--accent); }

        .gen-img { width: 100%; border-radius: 15px; margin-top: 15px; border: 2px solid var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="nav-btn" onclick="location.reload()">+ NOUVEAU CHAT</div>
    <div style="font-size: 12px; color: #555; margin-bottom: 10px; letter-spacing: 1px;">RÉCENT</div>
    <div id="history"></div>
    <div class="nav-btn" style="margin-top: auto; border-color: #444; color: #888;" onclick="toggleTheme()">🌓 THÈME</div>
</div>

<div id="main">
    <header>
        <div class="logo-area">
            <img src="logo.png" alt="AMPT" class="logo-img">
            <span style="font-size: 22px; font-weight: 800; letter-spacing: -1px;">AMPT <span style="color:var(--accent)">CHAT IA</span></span>
        </div>
        <div id="status" style="font-size: 12px; color: #00ff88;">● SYSTÈME ACTIF</div>
    </header>

    <div id="chat">
        <div class="msg">
            <div class="user-tag">⚡ AMPT IA</div>
            <div class="ai-content">Bonjour. Je suis votre interface **AMPT**. Je suis prête pour le code, l'analyse et la création. Comment puis-je vous servir ?</div>
        </div>
    </div>

    <div class="input-wrapper">
        <label for="img-in" class="action-btn">⊕</label>
        <input type="file" id="img-in" hidden accept="image/*">
        <input type="text" id="user-input" placeholder="Écrivez votre commande ici...">
        <button class="action-btn" onclick="startVoice()">🎤</button>
        <button class="action-btn" id="send-btn" onclick="send()">➤</button>
    </div>
</div>

<script>
    // TA CLÉ OPENAI INTÉGRÉE
    const API_KEY = "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";
    
    let chatHistory = [];

    async function send() {
        const input = document.getElementById('user-input');
        const text = input.value.trim();
        if(!text) return;

        appendMsg("Vous", text);
        input.value = "";

        // GÉNÉRATION IMAGE (Outil interne spécial)
        if(text.toLowerCase().includes("génère une image")) {
            const prompt = text.replace("génère une image de", "").trim();
            const imgUrl = `https://pollinations.ai/p/${encodeURIComponent(prompt)}?width=1024&height=1024&nologo=true`;
            appendMsg("AMPT IA", `Génération réussie pour : **${prompt}**<br><img src="${imgUrl}" class="gen-img">`);
            return;
        }

        try {
            const response = await fetch("https://api.openai.com/v1/chat/completions", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${API_KEY}`
                },
                body: JSON.stringify({
                    model: "gpt-4o-mini", // Modèle puissant et rapide
                    messages: [{role: "user", content: text}]
                })
            });

            const data = await response.json();
            const aiText = data.choices[0].message.content;
            appendMsg("AMPT IA", marked.parse(aiText));
            hljs.highlightAll();
            saveToHistory(text);
        } catch (e) {
            appendMsg("ERREUR", "Vérifiez votre connexion ou la validité de votre clé API.");
        }
    }

    function appendMsg(sender, content) {
        const chat = document.getElementById('chat');
        const html = `<div class="msg">
            <div class="user-tag">${sender === 'Vous' ? '👤 VOUS' : '⚡ AMPT IA'}</div>
            <div class="ai-content">${content}</div>
        </div>`;
        chat.innerHTML += html;
        chat.scrollTop = chat.scrollHeight;
    }

    function saveToHistory(text) {
        const hist = document.getElementById('history');
        const div = document.createElement('div');
        div.className = 'history-item';
        div.innerText = text.substring(0, 35) + "...";
        hist.prepend(div);
    }

    function startVoice() {
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
        rec.lang = 'fr-FR';
        rec.start();
        rec.onresult = (e) => { document.getElementById('user-input').value = e.results[0][0].transcript; };
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMPT Chat IA</title>
    <style>
        :root {
            --bg-color: #131314;
            --chat-bg: #1e1f20;
            --text-color: #e3e3e3;
            --accent-color: #a8c7fa;
            --user-msg: #303134;
            --ai-msg: #131314;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            padding: 20px;
            text-align: center;
            font-size: 24px;
            font-weight: bold;
            border-bottom: 1px solid #333;
        }
        #chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 15px;
            border-radius: 12px;
            line-height: 1.5;
        }
        .user-message {
            background-color: var(--user-msg);
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .ai-message {
            background-color: var(--ai-msg);
            align-self: flex-start;
            border: 1px solid #333;
            border-bottom-left-radius: 2px;
        }
        .message img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 10px;
        }
        #input-area {
            padding: 20px;
            background-color: var(--chat-bg);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        input[type="text"] {
            flex: 1;
            padding: 15px;
            border-radius: 24px;
            border: 1px solid #444;
            background-color: var(--bg-color);
            color: white;
            font-size: 16px;
        }
        input[type="text"]:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        button, label.icon-btn {
            background-color: transparent;
            border: none;
            color: var(--accent-color);
            cursor: pointer;
            font-size: 20px;
            padding: 10px;
        }
        button:hover, label.icon-btn:hover {
            opacity: 0.8;
        }
        #file-input {
            display: none;
        }
    </style>
</head>
<body>

    <header>AMPT Chat IA</header>

    <div id="chat-container">
        <div class="message ai-message">Bonjour ! Je suis AMPT Chat IA. Comment puis-je t'aider aujourd'hui ? Tu peux m'écrire, me parler ou m'envoyer une image.</div>
    </div>

    <div id="input-area">
        <label for="file-input" class="icon-btn" title="Ajouter une image">📷</label>
        <input type="file" id="file-input" accept="image/*">
        
        <button id="mic-btn" class="icon-btn" title="Parler">🎤</button>
        
        <input type="text" id="user-input" placeholder="Écris un message à AMPT Chat IA...">
        <button id="send-btn" class="icon-btn" title="Envoyer">➤</button>
    </div>

    <script>
        const API_KEY = "AIzaSyBZ308e4uTEfASoLGk_qDGbijM4x5Qs8oM"; // Remplace par ta clé API Google AI Studio
        const API_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${API_KEY}`;

        const chatContainer = document.getElementById('chat-container');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const fileInput = document.getElementById('file-input');
        const micBtn = document.getElementById('mic-btn');

        let currentImageBase64 = null;

        // Fonction pour ajouter un message à l'écran
        function addMessage(text, sender, imageUrl = null) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', sender === 'user' ? 'user-message' : 'ai-message');
            msgDiv.innerText = text;
            if (imageUrl) {
                const img = document.createElement('img');
                img.src = imageUrl;
                msgDiv.appendChild(img);
            }
            chatContainer.appendChild(msgDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // Gérer l'upload d'image
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onloadend = () => {
                    currentImageBase64 = reader.result.split(',')[1];
                    addMessage("Image sélectionnée, prête à être analysée.", "user", reader.result);
                };
                reader.readAsDataURL(file);
            }
        });

        // Reconnaissance vocale (Fonctionne sur Chrome/Edge)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (SpeechRecognition) {
            const recognition = new SpeechRecognition();
            recognition.lang = 'fr-FR';
            micBtn.addEventListener('click', () => {
                recognition.start();
                userInput.placeholder = "Écoute en cours...";
            });
            recognition.onresult = (event) => {
                userInput.value = event.results[0][0].transcript;
                userInput.placeholder = "Écris un message à AMPT Chat IA...";
            };
        } else {
            micBtn.style.display = "none"; // Cache le micro si non supporté
        }

        // Envoyer la requête à l'API
        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text && !currentImageBase64) return;

            addMessage(text || "Analyse cette image.", "user");
            userInput.value = "";
            const loadingMsg = document.createElement('div');
            loadingMsg.classList.add('message', 'ai-message');
            loadingMsg.innerText = "AMPT Chat IA réfléchit...";
            chatContainer.appendChild(loadingMsg);

            try {
                let parts = [{"text": `Tu es AMPT Chat IA. Réponds à ceci : ${text}`}];
                
                if (currentImageBase64) {
                    parts.push({
                        "inline_data": {
                            "mime_type": "image/jpeg",
                            "data": currentImageBase64
                        }
                    });
                }

                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "contents": [{"parts": parts}]
                    })
                });

                const data = await response.json();
                chatContainer.removeChild(loadingMsg);
                
                if (data.candidates && data.candidates.length > 0) {
                    const aiText = data.candidates[0].content.parts[0].text;
                    addMessage(aiText, "ai");
                } else {
                    addMessage("Désolé, je n'ai pas pu générer de réponse.", "ai");
                }
            } catch (error) {
                chatContainer.removeChild(loadingMsg);
                addMessage("Erreur de connexion à l'API.", "ai");
                console.error(error);
            }
            
            currentImageBase64 = null; // Réinitialise l'image après envoi
            fileInput.value = "";
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
